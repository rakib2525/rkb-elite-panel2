<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration - RKB ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --primary-green: #10b981;
            --text-light: #f8fafc;
            --border: #334155;
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-main);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .reg-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .reg-container h2 {
            color: var(--primary-green);
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .reg-container p {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 13px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary-green);
        }
        .btn-reg {
            width: 100%;
            padding: 14px;
            background: var(--primary-green);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-reg:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }
        .footer-link a {
            color: var(--primary-green);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="reg-container">
        <h2>RKB ELITE</h2>
        <p>Join our CPA Network as a Member</p>
        
        <form id="regForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>

            <div class="input-group">
                <label><i class="fab fa-telegram"></i> Telegram / Skype ID</label>
                <input type="text" id="contact" placeholder="@username or live:id" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-reg">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="index.html">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                contact: document.getElementById('contact').value, // Optional logic based on backend
                password: document.getElementById('password').value,
                role: 'member',
                status: 'pending' // Default pending for admin approval
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Registration Successful! Please wait for Admin approval.");
                    window.location.href = 'index.html';
                } else {
                    alert(data.message || "Registration Failed!");
                }
            } catch (err) {
                console.error(err);
                alert("Something went wrong!");
            }
        });
    </script>
</body>
</html>
